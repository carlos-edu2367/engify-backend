services:

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DEBUG: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build: .
    command: ["arq", "worker.WorkerSettings"]
    env_file:
      - .env
    environment:
      DEBUG: "false"
    restart: unless-stopped
